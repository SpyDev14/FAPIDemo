version: '3.8'

services:
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes: [db-data:/var/lib/postgresql/data]
    networks: [main]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    env_file: [.env]

  backend:
    build: .
    depends_on:
      db: { condition: service_healthy }
    environment:
      DB_HOST: db
      DB_PORT: 5432
    ports: ["8000:8000"]
    networks: [main]
    healthcheck:
      test: ["CMD", "ping", "127.0.0.1:8000/api/healthcheck"]
      interval: 1m30s
      timeout: 5s
      retries: 5
      start_period: 3s
    volumes: [.:/app]
    env_file: [.env]

volumes:
  db-data:

networks:
  main:
    driver: bridge
